name: Documentation

on:
  push:
    branches:
      - main
    tags: '*'
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v1
        with:
          version: '1.12'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openmpi-bin libopenmpi-dev

      - uses: julia-actions/cache@v1
        with:
          # Cache key includes hash of source files to invalidate when code changes
          cache-name: docs-cache-${{ hashFiles('src/**/*.jl', 'Project.toml') }}

      - name: Clean old Manifest and force fresh install
        run: |
          rm -f docs/Manifest.toml
          julia --project=docs/ -e '
            using Pkg
            # Force fresh develop to pick up latest code
            try Pkg.rm("Tarang") catch end
            Pkg.develop(PackageSpec(path=pwd()))
            Pkg.instantiate()
            Pkg.precompile()
          '

      - name: Build and deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
        run: julia --project=docs docs/make.jl
