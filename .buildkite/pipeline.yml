# JuliaGPU Buildkite pipeline for Tarang.jl
#
# Runs the GPU test suites that GitHub-hosted runners cannot (no NVIDIA GPU):
#   * single-GPU : GPU_TEST_FILES            (CUDA DCT / preconditioner)
#   * multi-GPU  : DISTRIBUTED_GPU_TEST_FILES (CUDA + NCCL distributed transpose)
#
# Test-file lists live in test/file_lists.jl and are driven by
# test/run_gpu_ci.jl (single process) and test/run_mpi_ci.jl (mpiexec).
#
# CUDA is a *weak* dependency of Tarang and NCCL is loaded dynamically by
# src/core/gpu_distributed.jl, so neither is in the package test target. The GPU
# jobs therefore `Pkg.add` them into the checkout before running, instead of
# using the JuliaCI/julia-test plugin (which would test the CUDA-less target).
# This keeps the CPU GitHub Actions CI lean (no CUDA artifacts there).
#
# ENABLEMENT (one-time, by a maintainer — free for open-source packages):
#   1. On the Julia Slack #gpu channel, ask a JuliaGPU Buildkite admin (e.g.
#      @maleadt, @vchuravy, @DilumAluthge) to add this repo. The GitHub account/org
#      hosting Tarang.jl must have the Buildkite GitHub App installed.
#   2. The admin creates a pipeline (named "Tarang") whose only configured step is
#      `buildkite-agent pipeline upload` on the juliagpu queue. That bootstrap step
#      reads THIS file and runs the GPU jobs below on JuliaGPU's GPU agents.
# Until then this file is inert (no CI consumes it).

steps:
  - label: ":julia: single-GPU — Julia {{matrix.julia}}"
    matrix:
      setup:
        julia:
          - "1.10"
          - "1.11"
          - "1.12"
    plugins:
      - JuliaCI/julia#v1:
          version: "{{matrix.julia}}"
    command: |
      julia --project=. -e '
        using Pkg
        Pkg.add("CUDA")          # CUDA is a weakdep; promote it for GPU CI
        Pkg.instantiate()
        Pkg.precompile()'
      julia --project=. test/run_gpu_ci.jl
    agents:
      queue: "juliagpu"
      cuda: "*"
    env:
      JULIA_NUM_THREADS: "2"
      OMP_NUM_THREADS: "1"
    if: build.message !~ /\[skip tests\]/
    timeout_in_minutes: 120

  - label: ":julia: multi-GPU NCCL — 2 ranks"
    plugins:
      - JuliaCI/julia#v1:
          version: "1.12"
    command: |
      julia --project=. -e '
        using Pkg
        Pkg.add(["CUDA", "NCCL"]) # CUDA weakdep + NCCL (loaded dynamically by gpu_distributed.jl)
        Pkg.instantiate()
        Pkg.precompile()'
      julia --project=. test/run_mpi_ci.jl
    agents:
      queue: "juliagpu"
      cuda: "*"
      multigpu: "*"
    env:
      TARANG_MPI_FILESET: "distributed_gpu"
      TARANG_MPI_NPROCS: "2"
      JULIA_NUM_THREADS: "1"
      OMP_NUM_THREADS: "1"
    if: build.message !~ /\[skip tests\]/
    timeout_in_minutes: 120
